name: GitGuardian secret scan

# Scans commits for leaked secrets (API keys, tokens, credentials) on every
# push and pull request, using GitGuardian's ggshield.
#
# Requires a repository secret named GITGUARDIAN_API_KEY (create one in the
# GitGuardian dashboard → API → Personal access tokens, then add it under
# Settings → Secrets and variables → Actions). Until that secret is set the
# scan step is skipped, so this workflow will not fail closed on every push.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  scanning:
    name: GitGuardian scan
    runs-on: ubuntu-latest
    env:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so all pushed commits are scanned

      - name: GitGuardian scan
        if: env.GITGUARDIAN_API_KEY != ''
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ env.GITGUARDIAN_API_KEY }}
