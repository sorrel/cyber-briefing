# Cyber Briefing Tool — Configuration
# Edit this file to tune sources, scoring, and delivery.

scoring:
  weights:
    geographic: 1.0
    domain: 1.5
    actionability: 1.2
    novelty: 0.8
  threshold: 10.0       # Minimum composite score for inclusion
  max_items: 20          # Maximum items in the briefing
  max_score_input: 150   # Cap items sent to Claude (sorted by recency first)
  model: "claude-sonnet-4-6"

delivery:
  method: "bear"         # bear | stdout | markdown_file
  bear_tag: "security/briefing/daily"
  markdown_output_dir: "~/cyberbriefing-output"

schedule:
  hour: 6
  minute: 0

# NVD filtering
nvd:
  min_cvss: 7.0
  # CWE IDs particularly relevant to appsec
  priority_cwes:
    - "CWE-89"    # SQL injection
    - "CWE-79"    # XSS
    - "CWE-862"   # Missing authorisation
    - "CWE-863"   # Incorrect authorisation
    - "CWE-918"   # SSRF
    - "CWE-352"   # CSRF
    - "CWE-502"   # Deserialisation
    - "CWE-611"   # XXE
    - "CWE-94"    # Code injection
    - "CWE-78"    # OS command injection
    - "CWE-287"   # Improper authentication
    - "CWE-306"   # Missing authentication
    - "CWE-639"   # IDOR
    - "CWE-284"   # Improper access control
    - "CWE-1321"  # Prototype pollution

sources:
  # Tier 1: Structured APIs
  cisa_kev:
    enabled: true
    type: api
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    category: advisory

  nvd:
    enabled: true
    type: api
    url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
    category: advisory

  hackerone:
    enabled: true
    type: api
    url: "https://api.hackerone.com/v1/hackers/hacktivity"
    category: bounty
    requires_auth: true

  github_advisories:
    enabled: true
    type: api
    url: "https://api.github.com/graphql"
    category: advisory

  # Tier 2: RSS Feeds
  rss_feeds:
    ncsc_all:
      url: "https://www.ncsc.gov.uk/api/1/services/v1/all-rss-feed.xml"
      category: advisory
      source_name: "NCSC"

    ncsc_reports:
      url: "https://www.ncsc.gov.uk/api/1/services/v1/report-rss-feed.xml"
      category: advisory
      source_name: "NCSC Reports"

    thehackernews:
      url: "https://feeds.feedburner.com/TheHackersNews"
      category: breach
      source_name: "The Hacker News"

    portswigger_research:
      url: "https://portswigger.net/research/rss"
      category: research
      source_name: "PortSwigger Research"

    portswigger_blog:
      url: "https://portswigger.net/blog/rss"
      category: research
      source_name: "PortSwigger Blog"

    krebs:
      url: "https://krebsonsecurity.com/feed/"
      category: breach
      source_name: "Krebs on Security"

    bleepingcomputer:
      url: "https://www.bleepingcomputer.com/feed/"
      category: breach
      source_name: "BleepingComputer"

    risky_biz:
      url: "https://risky.biz/feeds/risky-business/"
      category: breach
      source_name: "Risky Business"

    owasp:
      url: "https://owasp.org/feed.xml"
      category: research
      source_name: "OWASP"

    # OWASP project releases come from GitHub — the owasp.org feed above is
    # only the foundation blog (staffing, events). These fire on actual releases:
    owasp_top10_releases:
      url: "https://github.com/OWASP/Top10/releases.atom"
      category: research
      source_name: "OWASP Top 10"

    owasp_api_security_releases:
      url: "https://github.com/OWASP/API-Security/releases.atom"
      category: research
      source_name: "OWASP API Security"

    owasp_llm_top10_releases:
      url: "https://github.com/OWASP/www-project-top-10-for-large-language-model-applications/releases.atom"
      category: research
      source_name: "OWASP LLM Top 10"

    owasp_asvs_releases:
      url: "https://github.com/OWASP/ASVS/releases.atom"
      category: research
      source_name: "OWASP ASVS"

    owasp_cheatsheets_releases:
      url: "https://github.com/OWASP/CheatSheetSeries/releases.atom"
      category: research
      source_name: "OWASP Cheat Sheets"

    aws_security:
      url: "https://aws.amazon.com/blogs/security/feed/"
      category: vendor
      source_name: "AWS Security"

    feistyduck:
      url: "https://blog.ivanristic.com/atom.xml"
      category: research
      source_name: "FeistyDuck (Ivan Ristić)"

    feistyduck_newsletter:
      url: "https://www.feistyduck.com/newsletter/feed"
      category: research
      source_name: "FeistyDuck Newsletter"

    the_register:
      url: "https://www.theregister.com/security/headlines.atom"
      category: news
      source_name: "The Register"

    wiz_blog:
      url: "https://www.wiz.io/feed/rss.xml"
      category: research
      source_name: "Wiz Blog"
      max_entries: 30

    snyk_blog:
      url: "https://snyk.io/blog/feed/"
      category: research
      source_name: "Snyk Blog"
      max_entries: 30

    tldrsec:
      url: "https://tldrsec.com/feed.xml"  # /feed is CF-protected; feed.xml proxies Beehiiv directly
      category: research
      source_name: "tl;dr sec"

    trail_of_bits:
      url: "https://blog.trailofbits.com/feed/"
      category: research
      source_name: "Trail of Bits"

    google_project_zero:
      url: "https://googleprojectzero.blogspot.com/feeds/posts/default"
      category: research
      source_name: "Google Project Zero"

    latio_pulse:
      url: "https://pulse.latio.tech/feed"
      category: research
      source_name: "Latio Pulse"


  # Tier 3: Scrapers (less frequent, more fragile)
  scrapers:
    enisa:
      enabled: true
      url: "https://www.enisa.europa.eu/publications"
      category: policy
      source_name: "ENISA"
      check_interval_hours: 24

    ico:
      enabled: true
      url: "https://ico.org.uk/action-weve-taken/enforcement/"
      category: policy
      source_name: "ICO"
      check_interval_hours: 168  # weekly

    commons_library:
      enabled: true
      url: "https://commonslibrary.parliament.uk/research-briefings/cbp-9821/"
      category: policy
      source_name: "Commons Library"
      check_interval_hours: 168  # weekly

    tldr_infosec:
      enabled: true
      source_name: "TLDR Infosec"
      check_interval_hours: 23   # daily, Mon–Fri

    cloudseclist:
      enabled: true
      source_name: "CloudSecList"
      check_interval_hours: 24   # checks daily; issue number tracking handles weekly dedup

    aikido:
      enabled: true
      source_name: "Aikido Security Blog"
      check_interval_hours: 23   # daily

    this_week_in_security:
      enabled: true
      source_name: "This Week in Security"
      check_interval_hours: 168  # weekly (Sunday editions)

  # ---------------------------------------------------------------------------
  # PENDING SOURCES — not yet added, awaiting RSS access or verification
  # ---------------------------------------------------------------------------
  #
  # Ollie Whitehouse (NCSC CTO) — "CTO at NCSC: Cyber Defence Analysis"
  #   https://substack.com/@ollieatncsc
  #   Weekly technical newsletter. Trusted source, high signal for blue/purple teams.
  #   BLOCKED: Substack's new @username profile format has disabled RSS on this
  #   publication (ollieatncsc.substack.com/feed redirects to HTML). Check again
  #   periodically — Substack has historically restored RSS access.
  #   When it works: add under rss_feeds with category: research, source_name: "NCSC CTO"
  #
  # Anthropic Security Blog / News
  #   No RSS feed exists as of April 2026 — all standard feed URLs return 404.
  #   Anthropic model releases and safety research will surface via secondary
  #   sources already in config (The Hacker News, BleepingComputer, The Register).
  #   Check https://www.anthropic.com/news periodically for a feed.
    anthropic_red:
      enabled: true
      url: "https://red.anthropic.com/"
      category: research
      source_name: "Anthropic Red Team"
      check_interval_hours: 24

  # Anthropic main blog
  #   https://www.anthropic.com/blog/rss (verify URL — may need checking)
  #   Publishes responsible disclosure, model card updates, safety research.
  #   High relevance for AI/security intersection coverage.
  #
  # OpenAI Security Blog
  #   RSS URL uncertain — check https://openai.com/security
  #   Publishes CVEs against OpenAI platform, security research, incident reports.
  #
  # Google Cloud Security Blog
  #   https://cloud.google.com/blog/products/identity-security/rss
  #   GCP-specific advisories and research. Good counterpart to existing AWS Security feed.
  #
  # Microsoft Security Blog
  #   https://www.microsoft.com/en-us/security/blog/feed/
  #   Azure/M365 vulns, MSTIC threat intelligence. High volume — may need filtering.
  #
  # NIST Cybersecurity Insights
  #   https://www.nist.gov/blogs/cybersecurity-insights/rss.xml
  #   SP 800-series drafts, CSF/RMF framework updates. Low volume, high importance.
  #
  # NCSC Weekly Threat Report (distinct from existing NCSC feeds)
  #   https://www.ncsc.gov.uk/api/1/services/v1/weekly-threat-report-rss-feed.xml
  #   A specific NCSC product, worth adding alongside the existing all/reports feeds.
  #
  # Recorded Future Blog
  #   https://www.recordedfuture.com/blog/feed — verify URL
  #   Threat intelligence reports. Commercial but frequently publish open research.
  #
  # Mandiant / Google Threat Intelligence
  #   https://www.mandiant.com/resources/blog/rss.xml — verify URL
  #   High-quality APT and threat actor research.
  #
  # Didier Stevens Blog
  #   https://blog.didierstevens.com/feed/
  #   Deep malware/forensics analysis. Niche but genuinely novel technique posts.
